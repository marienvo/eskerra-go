# Frozen-rule violation store. The store directory (app/archunit_store/) is
# committed and acts as a one-way ratchet: existing violations are tolerated,
# new ones fail the build, and the store shrinks as violations are fixed.
# Set allowStoreCreation=true only when introducing a new frozen rule, then
# commit the generated store and (optionally) set it back to false.
freeze.store.default.allowStoreCreation=false
freeze.store.default.path=archunit_store
freeze.refreeze=false
