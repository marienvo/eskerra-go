name: CodeQL

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "19 21 * * 1"
  workflow_dispatch:

permissions:
  security-events: write
  packages: read
  actions: read
  contents: read

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (java-kotlin)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # Advanced CodeQL cannot upload SARIF while default setup is enabled.
      # https://docs.github.com/en/code-security/reference/code-scanning/sarif-files/troubleshoot-sarif-uploads/default-setup-enabled
      - name: Ensure CodeQL default setup is disabled
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          http_code=$(curl -sS -o /tmp/default-setup.json -w "%{http_code}" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/code-scanning/default-setup")
          if [ "${http_code}" = "200" ] && [ "$(jq -r '.state' /tmp/default-setup.json)" = "configured" ]; then
            echo "::error::CodeQL default setup is enabled. This workflow uses advanced setup (manual Android build) and cannot upload results until default setup is disabled. In the repo: Settings → Advanced Security → CodeQL analysis → menu → Disable CodeQL (or Switch to advanced → Disable CodeQL). Then re-run this workflow."
            exit 1
          fi

      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java-kotlin
          build-mode: manual
          config-file: ./.github/codeql/codeql-config.yml

      - name: Build Android (CodeQL trace)
        env:
          GRADLE_OPTS: -Dorg.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8
        run: |
          ./gradlew --no-daemon \
            -Dorg.gradle.configuration-cache=false \
            :app:assembleDebug

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:java-kotlin"
